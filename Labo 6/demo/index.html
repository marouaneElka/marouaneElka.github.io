<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        body{
            background-color: antiquewhite;
        }

        h1 {
            background-color: red;
        }

        p {
            background-color: blue;
        }
/*ze zijn twee soorten elementen: block and inline*/
        span {
            background-color: yellow;
        }

        .block {
            width: 100px;
            padding-left: 20px;
            border: 2px solid black;
            margin-left: auto;
            margin-right: auto;
        }

        .blockPar{
            /*width: 50%;
            margin-left: 30px;
            margin-bottom: 40px;
            margin-right: 50px;
            margin-top: 100px;*/

            margin: 100px 50px 40px 30px;
            padding: 50px 10px 100px 50px;
        }

        .spanCenter {
            margin-right: auto;
            margin-left: auto;
            width: 200px;
            display: inline-block;
        }
    </style>
</head>
<body>
    <h1 class="block">VIVES</h1>
    <p class="blockPar">Vives heeft verschillende campussen</p>
    <span class="spanCenter">CSS</span>
</body>
</html>
